name: Fetch energy usage

on:
  schedule:
    - cron: "30 13 * * *"  # 13:30 UTC daily (~8:30 AM CT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write SMT config
        env:
          SMT_USERNAME: ${{ secrets.SMT_USERNAME }}
          SMT_PASSWORD: ${{ secrets.SMT_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python - <<'EOF'
          import json, os, pathlib
          cfg = {
              "username": os.environ["SMT_USERNAME"],
              "password": os.environ["SMT_PASSWORD"],
              "gmail_user": os.environ["GMAIL_USER"],
              "gmail_app_password": os.environ["GMAIL_APP_PASSWORD"],
              "email_to": os.environ["EMAIL_TO"],
          }
          pathlib.Path.home().joinpath(".smt_config.json").write_text(json.dumps(cfg))
          EOF

      - name: Run fetch
        run: python fetch_usage.py

      - name: Commit updated CSV
        run: |
          if git diff --quiet Daily_Data.csv; then
            echo "No CSV changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Daily_Data.csv
          git commit -m "Update Daily_Data.csv ($(date -u +%Y-%m-%d))"
          git push
